<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Payroll — Kenya (prototype)</title>
<style>
  :root{
    --bg:#f5f4ef; --card:#ffffff; --line:#e6e4db; --txt:#1f1f1d; --mut:#6b6a64;
    --accent:#185fa5; --accent-bg:#e6f1fb; --danger:#a32d2d; --ok:#3b6d11;
    --radius:10px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1d1c1a; --card:#2a2926; --line:#3a3935; --txt:#f1efe8; --mut:#a8a69d;
      --accent:#85b7eb; --accent-bg:#0c447c; --danger:#f09595; --ok:#97c459; }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--font);
    -webkit-text-size-adjust:100%;line-height:1.5;padding:16px;}
  .wrap{max-width:440px;margin:0 auto;}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .logo{width:38px;height:38px;border-radius:10px;background:var(--accent-bg);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;}
  .h1{font-size:17px;font-weight:600;margin:0;}
  .sub{font-size:13px;color:var(--mut);}
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
  label{display:block;font-size:13px;color:var(--mut);margin-bottom:5px;}
  input[type=text],input[type=number]{width:100%;font-size:16px;padding:9px 11px;border:0.5px solid var(--line);
    border-radius:var(--radius);background:var(--bg);color:var(--txt);}
  .chips{display:flex;gap:8px;margin-top:10px;}
  button{font-family:var(--font);}
  .chip,.seg{flex:1;font-size:13px;padding:8px 0;border:0.5px solid var(--line);border-radius:var(--radius);
    background:var(--card);color:var(--txt);cursor:pointer;}
  .seg.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600;}
  .secrow{font-size:13px;color:var(--mut);margin-bottom:10px;}
  .r{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:15px;}
  .r .l{color:var(--mut);} .r .v{color:var(--txt);} .neg{color:var(--danger);}
  .muted .l,.muted .v{color:var(--mut);}
  .divider{border-top:0.5px solid var(--line);margin:10px 0;}
  .net .l{font-weight:600;color:var(--txt);} .net .v{font-weight:700;font-size:20px;}
  .small{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);}
  .small .v{color:var(--txt);font-weight:600;}
  .badge{font-size:12px;color:var(--mut);margin-top:4px;}
  .badge.ok{color:var(--ok);}
  .foot{font-size:12px;color:var(--mut);margin-top:14px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">₭</div>
    <div>
      <p class="h1">Run payroll</p>
      <div class="sub">Kenya · KES · monthly</div>
    </div>
  </div>

  <div class="card">
    <label for="name">Employee</label>
    <input id="name" type="text" value="Wanjiru K." />
    <div style="height:12px"></div>
    <label for="gross">Gross monthly pay (KES)</label>
    <input id="gross" type="number" min="0" step="1000" value="50000" inputmode="numeric" />
    <div class="chips">
      <button class="chip" data-v="30000">30,000</button>
      <button class="chip" data-v="50000">50,000</button>
      <button class="chip" data-v="100000">100,000</button>
    </div>
    <div class="chips">
      <button class="seg" id="resOn">Resident</button>
      <button class="seg" id="resOff">Non-resident</button>
    </div>
  </div>

  <div class="card">
    <div class="secrow">Payslip</div>
    <div class="r"><span class="l">Gross pay</span><span class="v" id="oGross">—</span></div>
    <div class="r"><span class="l">NSSF</span><span class="v neg" id="oNssf">—</span></div>
    <div class="r"><span class="l">SHIF</span><span class="v neg" id="oShif">—</span></div>
    <div class="r"><span class="l">Housing levy</span><span class="v neg" id="oAhl">—</span></div>
    <div class="r muted"><span class="l">Taxable pay</span><span class="v" id="oBase">—</span></div>
    <div class="r"><span class="l">PAYE <span id="oPayeSub" style="font-size:12px;color:var(--mut)"></span></span><span class="v neg" id="oPaye">—</span></div>
    <div class="divider"></div>
    <div class="r net"><span class="l">Net pay</span><span class="v" id="oNet">—</span></div>
  </div>

  <div class="card">
    <div class="small"><span>Employer cost (NSSF + levy)</span><span class="v" id="oEmp">—</span></div>
    <div class="small" style="margin-top:8px"><span>Total cost to employer</span><span class="v" id="oTotal">—</span></div>
  </div>

  <div class="badge" id="badge"></div>
  <div class="foot">Prototype of the PayrollDomestic run-payroll screen. Math mirrors the verified PayrollCore engine (Swift).</div>
</div>

<script>
  var f = new Intl.NumberFormat('en-KE', { maximumFractionDigits: 0 });
  var kes = function (n) { return 'KES ' + f.format(Math.round(n)); };
  var resident = true;

  function compute(g) {
    var nssf = 0.06 * Math.min(g, 9000) + 0.06 * Math.max(0, Math.min(g, 108000) - 9000);
    var shif = g * 0.0275, ahl = g * 0.015;
    var base = g - (nssf + shif + ahl);
    var bands = [[24000, 0.10], [32333, 0.25], [500000, 0.30], [800000, 0.325], [Infinity, 0.35]];
    var tax = 0, low = 0;
    for (var i = 0; i < bands.length; i++) {
      var up = bands[i][0], rt = bands[i][1];
      if (base <= low) break;
      var s = Math.min(base, up) - low;
      if (s > 0) tax += s * rt;
      low = up;
      if (up === Infinity) break;
    }
    var relief = resident ? 2400 : 0;
    var applied = Math.min(Math.max(0, tax), relief);
    var payeNet = tax - applied;
    var R = Math.round;
    var net = R(g) - (R(nssf) + R(shif) + R(ahl) + R(payeNet));
    return { g: R(g), nssf: R(nssf), shif: R(shif), ahl: R(ahl), base: R(base),
      tax: R(tax), relief: R(applied), paye: R(payeNet), net: net, emp: R(nssf) + R(ahl) };
  }
  function set(id, v) { document.getElementById(id).textContent = v; }
  function render() {
    var g = Math.max(0, Number(document.getElementById('gross').value) || 0);
    var c = compute(g);
    set('oGross', kes(c.g)); set('oNssf', '−' + kes(c.nssf)); set('oShif', '−' + kes(c.shif));
    set('oAhl', '−' + kes(c.ahl)); set('oBase', kes(c.base)); set('oPaye', '−' + kes(c.paye));
    set('oNet', kes(c.net)); set('oEmp', kes(c.emp)); set('oTotal', kes(c.g + c.emp));
    document.getElementById('oPayeSub').textContent = resident
      ? '(tax ' + f.format(c.tax) + ' − relief ' + f.format(c.relief) + ')'
      : '(tax ' + f.format(c.tax) + ', no relief)';
    document.getElementById('resOn').classList.toggle('active', resident);
    document.getElementById('resOff').classList.toggle('active', !resident);
    var ok = (g === 50000 && resident && c.paye === 5846 && c.net === 39029);
    var b = document.getElementById('badge');
    b.className = 'badge' + (ok ? ' ok' : '');
    b.textContent = ok ? '✓ matches the engine golden test (PAYE 5,846 · net 39,029)'
      : 'mirrors the verified PayrollCore engine';
  }
  document.getElementById('gross').addEventListener('input', render);
  var chips = document.getElementsByClassName('chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].addEventListener('click', function () {
      document.getElementById('gross').value = this.getAttribute('data-v'); render();
    });
  }
  document.getElementById('resOn').addEventListener('click', function () { resident = true; render(); });
  document.getElementById('resOff').addEventListener('click', function () { resident = false; render(); });
  render();
</script>
</body>
</html>
